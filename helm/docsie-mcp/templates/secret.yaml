{{- if .Values.doppler.enabled }}
# Doppler service token — needed by the Doppler operator to fetch secrets
apiVersion: v1
kind: Secret
metadata:
  name: doppler-token-{{ .Release.Name }}
type: Opaque
stringData:
  serviceToken: {{ .Values.doppler.token | quote }}
---
# DopplerSecret CR — operator syncs Doppler config into a K8s Secret
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: doppler-{{ .Release.Name }}
spec:
  host: https://api.doppler.com
  tokenSecret:
    name: doppler-token-{{ .Release.Name }}
  managedSecret:
    name: {{ .Values.doppler.managedSecretName }}
    namespace: {{ .Release.Namespace }}
    type: Opaque
  resyncSeconds: {{ .Values.doppler.resyncSeconds }}
  verifyTLS: true
{{- end }}
